<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gündelik Yaşam Dengesi Planlayıcısı</title>
  
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Google Fonts (Plus Jakarta Sans) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  
  <!-- React ve Babel Global CDN'leri -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Firebase Compat (Garantili Çalışan Global Sürüm) CDN'leri -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

  <style>
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
    }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 antialiased">

  <!-- React Kök Elementi -->
  <div id="root"></div>

  <!-- React ve Firebase Mantığı -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // Bulut Yapılandırma ve Servis Başlatma (Hata riskine karşı korumalı)
    const firebaseConfig = JSON.parse(__firebase_config);
    if (!firebase.apps.length) {
      firebase.initializeApp(firebaseConfig);
    }
    const auth = firebase.auth();
    const db = firebase.firestore();
    const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';

    // Şablon Görev Listesi
    const INITIAL_TASKS = [
      { id: 't1', category: 'temizlik', text: 'Evi havalandır ve genel toz al', completed: false },
      { id: 't2', category: 'temizlik', text: 'Mutfak tezgahını temizle ve dezenfekte et', completed: false },
      { id: 't3', category: 'yemek', text: 'Günün ana yemek menüsünü planla', completed: false },
      { id: 't4', category: 'yemek', text: 'Yemek sonrası mutfak düzenini sağla', completed: false },
      { id: 't5', category: 'dikis', text: 'Eksik düğme ve sökükleri kontrol et', completed: false },
    ];

    // Günlük pratik yaşam tüyoları
    const DAILY_TIPS = [
      { category: 'temizlik', title: '15 Dakika Kuralı', content: 'Her gün sadece 15 dakikanızı hızlıca dağınıklık toplamaya ayırarak haftalık büyük temizlik yükünü %80 azaltabilirsiniz.' },
      { category: 'yemek', title: 'Toplu Doğrama (Prep)', content: 'Hafta başında soğan, sarımsak ve sebzeleri doğrayıp saklama kaplarına koymak, günlük yemek yapma sürenizi yarı yarıya kısaltır.' },
      { category: 'dikis', title: 'Doğru İğne Seçimi', content: 'Kumaşınıza uygun iğne kullanmak dikiş makinenizin ömrünü uzatır ve dikişlerin sökülmesini tamamen önler.' },
      { category: 'temizlik', title: 'Yukarıdan Aşağıya', content: 'Toz alırken her zaman en üst raflardan başlayıp en son yerleri süpürün. Böylece yere düşen tozları tekrar temizlemek zorunda kalmazsınız.' },
      { category: 'yemek', title: 'Tek Tencere Mucizesi', content: 'Haftada bir gün her şeyi tek tencerede pişirebileceğiniz tarifler seçerek bulaşık süresinden ciddi tasarruf sağlayın.' }
    ];

    function App() {
      const [activeTab, setActiveTab] = useState('bugun');
      const [setupCompleted, setSetupCompleted] = useState(false);
      
      const [user, setUser] = useState(null);
      const [dataLoading, setDataLoading] = useState(true);
      const [syncing, setSyncing] = useState(false);

      // Sihirbaz Durumları
      const [houseSize, setHouseSize] = useState('orta'); 
      const [familyMembers, setFamilyMembers] = useState('2-3'); 
      const [cookingStyle, setCookingStyle] = useState('orta'); 
      const [sewingPurpose, setSewingPurpose] = useState('hobi'); 

      // Hedef Süreler (Dakika)
      const [targets, setTargets] = useState({
        temizlik: 30,
        yemek: 45,
        dikis: 20
      });

      // Harcanan Zamanlar (Saniye)
      const [spentTime, setSpentTime] = useState({
        temizlik: 0,
        yemek: 0,
        dikis: 0
      });

      const [activeTimer, setActiveTimer] = useState(null); 
      const [tasks, setTasks] = useState(INITIAL_TASKS);
      const [newTaskText, setNewTaskText] = useState('');
      const [newTaskCategory, setNewTaskCategory] = useState('temizlik');
      const [notification, setNotification] = useState(null);

      // Sabit Haftalık Grafikler İçin Veri
      const [weeklyHistory] = useState([
        { gun: 'Pzt', temizlik: 25, yemek: 40, dikis: 15 },
        { gun: 'Sal', temizlik: 35, yemek: 50, dikis: 0 },
        { gun: 'Çar', temizlik: 20, yemek: 30, dikis: 30 },
        { gun: 'Per', temizlik: 45, yemek: 60, dikis: 10 },
        { gun: 'Cum', temizlik: 30, yemek: 45, dikis: 25 },
        { gun: 'Cmt', temizlik: 60, yemek: 90, dikis: 45 },
        { gun: 'Paz', temizlik: 15, yemek: 35, dikis: 50 },
      ]);

      const triggerNotification = (message) => {
        setNotification(message);
        setTimeout(() => {
          setNotification(null);
        }, 4000);
      };

      // 1. ADIM: Güvenli Kimlik Doğrulama (RULE 3)
      useEffect(() => {
        const initAuth = async () => {
          try {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
              await auth.signInWithCustomToken(__initial_auth_token);
            } else {
              await auth.signInAnonymously();
            }
          } catch (error) {
            console.error("Giriş hatası:", error);
          }
        };
        initAuth();
        const unsubscribe = auth.onAuthStateChanged((currentUser) => {
          setUser(currentUser);
        });
        return () => unsubscribe();
      }, []);

      // 2. ADIM: Gerçek Zamanlı Bulut Senkronizasyonu (RULE 1)
      useEffect(() => {
        if (!user) return;

        const stateDocRef = db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('state').doc('current');
        
        const unsubscribe = stateDocRef.onSnapshot((docSnap) => {
          if (docSnap.exists) {
            const cloudData = docSnap.data();
            if (cloudData.targets) setTargets(cloudData.targets);
            if (cloudData.spentTime) setSpentTime(cloudData.spentTime);
            if (cloudData.tasks) setTasks(cloudData.tasks);
            if (cloudData.setupCompleted !== undefined) setSetupCompleted(cloudData.setupCompleted);
          } else {
            // İlk kez açılıyorsa varsayılan veriyi kaydet
            saveStateToFirebase({
              targets: { temizlik: 30, yemek: 45, dikis: 20 },
              spentTime: { temizlik: 0, yemek: 0, dikis: 0 },
              tasks: INITIAL_TASKS,
              setupCompleted: false
            }, user.uid);
          }
          setDataLoading(false);
        }, (error) => {
          console.error("Bulut veri dinleme hatası:", error);
          setDataLoading(false);
        });

        return () => unsubscribe();
      }, [user]);

      // Buluta veri kaydetme aracı
      const saveStateToFirebase = async (updates, currentUserId) => {
        const uid = currentUserId || user?.uid;
        if (!uid) return;
        setSyncing(true);
        const stateDocRef = db.collection('artifacts').doc(appId).collection('users').doc(uid).collection('state').doc('current');
        try {
          await stateDocRef.set(updates, { merge: true });
        } catch (e) {
          console.error("Bulut kaydetme hatası:", e);
        } finally {
          setTimeout(() => setSyncing(false), 500);
        }
      };

      // Sihirbaz Tercihleri Değişince Önerilen Süreleri Ayarla
      useEffect(() => {
        if (setupCompleted) return;
        let cleanMin = 20;
        if (houseSize === 'orta') cleanMin = 40;
        if (houseSize === 'buyuk') cleanMin = 60;
        if (familyMembers === '2-3') cleanMin += 10;
        if (familyMembers === '4+') cleanMin += 25;

        let cookMin = 30;
        if (cookingStyle === 'orta') cookMin = 50;
        if (cookingStyle === 'detayli') cookMin = 80;
        if (familyMembers === '4+') cookMin += 15;

        let sewMin = 15;
        if (sewingPurpose === 'hobi') sewMin = 35;
        if (sewingPurpose === 'profesyonel') sewMin = 75;

        setTargets({
          temizlik: cleanMin,
          yemek: cookMin,
          dikis: sewMin
        });
      }, [houseSize, familyMembers, cookingStyle, sewingPurpose, setupCompleted]);

      // Aktif Kronometre Döngüsü
      useEffect(() => {
        let interval = null;
        if (activeTimer) {
          interval = setInterval(() => {
            setSpentTime(prev => {
              const updated = { ...prev, [activeTimer]: prev[activeTimer] + 1 };
              const targetInSec = targets[activeTimer] * 60;
              
              if (updated[activeTimer] === targetInSec) {
                triggerNotification(`🎉 Tebrikler! Günlük ${activeTimer === 'temizlik' ? 'Temizlik' : activeTimer === 'yemek' ? 'Yemek' : 'Dikiş'} hedefinize ulaştınız.`);
              }
              return updated;
            });
          }, 1000);
        } else {
          clearInterval(interval);
        }
        return () => clearInterval(interval);
      }, [activeTimer, targets]);

      // Aktif Çalışırken Her 10 Saniyede Bir Otomatik Kayıt Yap
      useEffect(() => {
        if (!activeTimer) return;
        const backupInterval = setInterval(() => {
          saveStateToFirebase({ spentTime });
        }, 10000);

        return () => {
          clearInterval(backupInterval);
          saveStateToFirebase({ spentTime });
        };
      }, [activeTimer, spentTime]);

      const adjustTime = (category, amountInMinutes) => {
        const nextSpent = { ...spentTime, [category]: Math.max(0, spentTime[category] + (amountInMinutes * 60)) };
        setSpentTime(nextSpent);
        saveStateToFirebase({ spentTime: nextSpent });
        const categoryLabel = category === 'temizlik' ? 'Temizlik' : category === 'yemek' ? 'Yemek' : 'Dikiş';
        triggerNotification(`${categoryLabel} süresi manuel güncellendi.`);
      };

      const handleToggleTask = (id) => {
        const updatedTasks = tasks.map(t => {
          if (t.id === id) {
            const nextState = !t.completed;
            if (nextState) {
              triggerNotification("📋 Harika, görevi tamamladınız!");
            }
            return { ...t, completed: nextState };
          }
          return t;
        });
        setTasks(updatedTasks);
        saveStateToFirebase({ tasks: updatedTasks });
      };

      const handleAddTask = (e) => {
        e.preventDefault();
        if (!newTaskText.trim()) return;
        const newTask = {
          id: Date.now().toString(),
          category: newTaskCategory,
          text: newTaskText.trim(),
          completed: false
        };
        const updatedTasks = [...tasks, newTask];
        setTasks(updatedTasks);
        saveStateToFirebase({ tasks: updatedTasks });
        setNewTaskText('');
        triggerNotification("➕ Görev eklendi.");
      };

      const handleDeleteTask = (id) => {
        const updatedTasks = tasks.filter(t => t.id !== id);
        setTasks(updatedTasks);
        saveStateToFirebase({ tasks: updatedTasks });
        triggerNotification("🗑️ Görev silindi.");
      };

      const handleQuickCompleteCategory = (category) => {
        const updatedTime = { ...spentTime, [category]: targets[category] * 60 };
        const updatedTasks = tasks.map(t => t.category === category ? { ...t, completed: true } : t);
        
        setSpentTime(updatedTime);
        setTasks(updatedTasks);
        saveStateToFirebase({ spentTime: updatedTime, tasks: updatedTasks });
        triggerNotification(`🎯 Tüm ${category} görevleri tamamlandı olarak kaydedildi!`);
      };

      const formatTime = (seconds) => {
        const hrs = Math.floor(seconds / 3600);
        const mins = Math.floor((seconds % 3600) / 60);
        const secs = seconds % 60;
        return `${hrs > 0 ? hrs + 'sa ' : ''}${mins}dk ${secs}sn`;
      };

      const [currentTip, setCurrentTip] = useState(DAILY_TIPS[0]);
      const rotateTip = () => {
        const randomIndex = Math.floor(Math.random() * DAILY_TIPS.length);
        setCurrentTip(DAILY_TIPS[randomIndex]);
      };

      // Yükleniyor Ekranı
      if (dataLoading) {
        return (
          <div className="min-h-screen bg-slate-50 flex flex-col items-center justify-center p-4">
            <div className="w-14 h-14 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin"></div>
            <p className="mt-4 font-bold text-slate-700 text-base">Güvenli Veritabanı Bağlantısı Kuruluyor...</p>
            <p className="text-xs text-slate-400 mt-1">Lütfen bekleyin, verileriniz senkronize ediliyor.</p>
          </div>
        );
      }

      return (
        <div className="min-h-screen bg-slate-50 text-slate-800 flex flex-col selection:bg-indigo-500 selection:text-white">
          
          {notification && (
            <div className="fixed top-5 right-5 z-50 bg-slate-900 text-white px-6 py-4 rounded-xl shadow-2xl flex items-center space-x-3 border border-indigo-500/30 animate-bounce">
              <span className="text-xl">✨</span>
              <p className="font-semibold text-sm md:text-base">{notification}</p>
            </div>
          )}

          {/* Header */}
          <header className="sticky top-0 bg-white/95 border-b border-slate-200 z-40 backdrop-blur-md">
            <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex flex-col lg:flex-row justify-between items-center gap-4">
              <div className="flex items-center space-x-3">
                <div className="w-10 h-10 rounded-xl bg-gradient-to-tr from-indigo-600 via-indigo-500 to-rose-500 flex items-center justify-center shadow-lg text-white font-black text-xl tracking-tight">
                  D
                </div>
                <div>
                  <div className="flex items-center gap-2">
                    <h1 className="text-xl font-bold bg-gradient-to-r from-slate-900 to-indigo-950 bg-clip-text text-transparent">
                      Günlük Yaşam Dengesi
                    </h1>
                    <span className={`inline-flex items-center gap-1 px-2.5 py-0.5 rounded-full text-[10px] font-bold ${
                      syncing ? 'bg-amber-100 text-amber-800 animate-pulse' : 'bg-emerald-100 text-emerald-800'
                    }`}>
                      {syncing ? '🔄 Kaydediliyor...' : '☁️ Bulut Aktif'}
                    </span>
                  </div>
                  <p className="text-xs text-slate-500 font-medium">Temizlik • Yemek Yapımı • Dikiş & Tasarım Planlayıcısı</p>
                </div>
              </div>

              {/* Sekme Seçiciler */}
              <div className="flex flex-wrap items-center justify-center gap-1.5 bg-slate-100 p-1.5 rounded-xl border border-slate-200">
                <button
                  type="button"
                  onClick={() => setActiveTab('bugun')}
                  className={`px-3 py-2 rounded-lg text-xs md:text-sm font-semibold transition-all duration-200 ${
                    activeTab === 'bugun' ? 'bg-white text-indigo-600 shadow-sm' : 'text-slate-600 hover:text-slate-900 hover:bg-slate-200/50'
                  }`}
                >
                  📊 Bugünün Dengesi
                </button>
                <button
                  type="button"
                  onClick={() => setActiveTab('gorevler')}
                  className={`px-3 py-2 rounded-lg text-xs md:text-sm font-semibold transition-all duration-200 ${
                    activeTab === 'gorevler' ? 'bg-white text-indigo-600 shadow-sm' : 'text-slate-600 hover:text-slate-900 hover:bg-slate-200/50'
                  }`}
                >
                  📋 Görevlerim ({tasks.filter(t => !t.completed).length})
                </button>
                <button
                  type="button"
                  onClick={() => setActiveTab('analiz')}
                  className={`px-3 py-2 rounded-lg text-xs md:text-sm font-semibold transition-all duration-200 ${
                    activeTab === 'analiz' ? 'bg-white text-indigo-600 shadow-sm' : 'text-slate-600 hover:text-slate-900 hover:bg-slate-200/50'
                  }`}
                >
                  📈 Analizler
                </button>
                <button
                  type="button"
                  onClick={() => setActiveTab('ayarlar')}
                  className={`px-3 py-2 rounded-lg text-xs md:text-sm font-semibold transition-all duration-200 ${
                    activeTab === 'ayarlar' ? 'bg-white text-indigo-600 shadow-sm' : 'text-slate-600 hover:text-slate-900 hover:bg-slate-200/50'
                  }`}
                >
                  ⚙️ Süre Ayarları
                </button>
              </div>
            </div>
          </header>

          <main className="flex-1 max-w-7xl w-full mx-auto px-4 sm:px-6 lg:px-8 py-8">
            
            {!setupCompleted && (
              <div className="mb-8 p-6 bg-gradient-to-r from-indigo-50 to-rose-50 border border-indigo-100 rounded-3xl relative overflow-hidden shadow-sm">
                <div className="relative z-10 flex flex-col md:flex-row md:items-center justify-between gap-6">
                  <div className="max-w-2xl">
                    <span className="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-semibold bg-indigo-100 text-indigo-800 mb-3">
                      Süre Sihirbazı
                    </span>
                    <h2 className="text-xl md:text-2xl font-bold text-slate-900">
                      Önerilen Sürelerinizi Hesaplayalım mı?
                    </h2>
                    <p className="mt-1 text-sm text-slate-600">
                      Yaşam tarzınıza göre en ideal günlük süreleri otomatik hesaplamak için sihirbazı başlatabilirsiniz.
                    </p>
                  </div>
                  <button
                    type="button"
                    onClick={() => setActiveTab('ayarlar')}
                    className="px-6 py-3 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold rounded-2xl transition duration-200 shadow-lg text-center"
                  >
                    Hemen Hesapla 🚀
                  </button>
                </div>
              </div>
            )}

            {/* SEKMELER - Bugun */}
            {activeTab === 'bugun' && (
              <div className="space-y-8">
                <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                  
                  {/* Temizlik Kartı */}
                  <div className="bg-white rounded-3xl border border-slate-200 p-6 flex flex-col shadow-sm hover:shadow-md transition relative overflow-hidden">
                    <div className="absolute top-0 left-0 w-full h-1.5 bg-emerald-500"></div>
                    <div className="flex justify-between items-start mb-6">
                      <div className="p-3 bg-emerald-50 rounded-2xl text-emerald-600">
                        <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                          <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"/>
                        </svg>
                      </div>
                      <span className="text-xs font-semibold px-2.5 py-1 bg-emerald-50 text-emerald-800 rounded-lg">Temizlik</span>
                    </div>

                    <h3 className="text-lg font-bold text-slate-800">Temizlik & Düzen</h3>
                    <p className="text-xs text-slate-500 mt-1">Önerilen Hedef: <strong>{targets.temizlik} dakika</strong></p>

                    <div className="my-6">
                      <div className="flex justify-between text-xs font-semibold mb-1">
                        <span className="text-emerald-600">{formatTime(spentTime.temizlik)}</span>
                        <span className="text-slate-400">{targets.temizlik}dk</span>
                      </div>
                      <div className="w-full bg-slate-100 rounded-full h-3 overflow-hidden">
                        <div 
                          className="bg-emerald-500 h-full rounded-full transition-all duration-300"
                          style={{ width: `${Math.min(100, (spentTime.temizlik / (targets.temizlik * 60)) * 100)}%` }}
                        ></div>
                      </div>
                    </div>

                    <div className="bg-slate-50 p-4 rounded-2xl border border-slate-100 flex flex-col gap-3 mt-auto">
                      <div className="text-center font-mono text-xl font-bold text-slate-700">
                        {formatTime(spentTime.temizlik)}
                      </div>
                      <div className="grid grid-cols-1 gap-2">
                        {activeTimer === 'temizlik' ? (
                          <button
                            type="button"
                            onClick={() => setActiveTimer(null)}
                            className="py-2.5 px-4 bg-amber-500 hover:bg-amber-600 text-white font-semibold rounded-xl text-sm transition"
                          >
                            ⏸️ Duraklat
                          </button>
                        ) : (
                          <button
                            type="button"
                            onClick={() => {
                              setActiveTimer('temizlik');
                              triggerNotification("⏱️ Temizlik süresi başlatıldı.");
                            }}
                            className="py-2.5 px-4 bg-emerald-600 hover:bg-emerald-700 text-white font-semibold rounded-xl text-sm transition"
                          >
                            ▶️ Süreyi Başlat
                          </button>
                        )}
                      </div>
                      <div className="flex justify-between items-center border-t border-slate-200 pt-2.5 text-xs text-slate-500">
                        <span>Süre Ekle:</span>
                        <div className="flex gap-1">
                          <button type="button" onClick={() => adjustTime('temizlik', 5)} className="px-2 py-1 bg-white border rounded hover:bg-slate-50">+5dk</button>
                          <button type="button" onClick={() => adjustTime('temizlik', 15)} className="px-2 py-1 bg-white border rounded hover:bg-slate-50">+15dk</button>
                        </div>
                      </div>
                    </div>

                    <button
                      type="button"
                      onClick={() => handleQuickCompleteCategory('temizlik')}
                      className="mt-4 w-full py-2.5 border border-dashed border-emerald-300 text-emerald-600 rounded-2xl text-xs font-bold hover:bg-emerald-50 transition"
                    >
                      ✓ Bugünün Temizliğini Bitir
                    </button>
                  </div>

                  {/* Yemek Kartı */}
                  <div className="bg-white rounded-3xl border border-slate-200 p-6 flex flex-col shadow-sm hover:shadow-md transition relative overflow-hidden">
                    <div className="absolute top-0 left-0 w-full h-1.5 bg-rose-500"></div>
                    <div className="flex justify-between items-start mb-6">
                      <div className="p-3 bg-rose-50 rounded-2xl text-rose-600">
                        <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                          <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/>
                        </svg>
                      </div>
                      <span className="text-xs font-semibold px-2.5 py-1 bg-rose-50 text-rose-800 rounded-lg">Yemek</span>
                    </div>
